
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Slider</title>
    <link rel="stylesheet" href="style1.css">
</head>


<body>
    <div class="slider-container">
        <div class="slider">
            
             
        
        
            <div class="slide">
                <img src="images/Service-Excellence.jpg" alt="Image 1">
                <button class="prev-btn">&#10094;</button>
                <button class="next-btn">&#10095;</button>
            </div>

           
            <div class="slide">
                <img src="images/Economic_Growth.jpg" alt="Image 3">
                <button class="prev-btn">&#10094;</button>
                <button class="next-btn">&#10095;</button>
            </div>

            <div class="slide">
                <img src="images/Integrity.jpg" alt="Image 4">
                <button class="prev-btn">&#10094;</button>
                <button class="next-btn">&#10095;</button>
            </div>
             <div class="slide">
                <img src="images/innovation.jpg" alt="Image 2">
                <button class="prev-btn">&#10094;</button>
                <button class="next-btn">&#10095;</button>
            </div>
           
            <div class="slide">
                <img src="images/community.jpg" alt="Image 1">
                <button class="prev-btn">&#10094;</button>
                <button class="next-btn">&#10095;</button>
            </div>
           
           
           
           
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
